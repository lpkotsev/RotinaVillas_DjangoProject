{% extends "shared/base.html" %}
{% load static %}

{% block content %}

<div class="container mt-5">

<h2>Edit Villa</h2>

<form method="post" enctype="multipart/form-data">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Update Villa
    </button>

    <a href="{% url 'my-villas' %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

</div>

{% endblock %}
