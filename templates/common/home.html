{% extends "shared/base.html" %}
{% load static %}

{% block content %}

<section class="hero">

    <video autoplay muted loop playsinline class="hero-video">
        <source src="{% static 'videos/villa-hero.mp4' %}" type="video/mp4">
    </video>

    <div class="hero-overlay">

        <div class="hero-text">

            <h1>Discover Luxury Villas</h1>

            <p>Find your perfect vacation home</p>

            <a href="{% url 'villa-list-page' %}" class="hero-button">
                Browse Villas
            </a>

        </div>

    </div>

</section>

{% endblock %}
